<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>토탈 커맨더 인터랙티브 마스터 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #1e40af; font-weight: 700; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .param-chip { @apply px-3 py-1 rounded-full text-[11px] font-bold border transition-all cursor-pointer shadow-sm; }
        .command-row:hover { background-color: rgba(37, 99, 235, 0.05); }
        .copyable-cmd { cursor: pointer; transition: all 0.2s; position: relative; }
        .copyable-cmd:hover { color: #2563eb; background: rgba(37, 99, 235, 0.08); text-decoration: underline; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #f1f5f9; }
        .recipe-card { min-height: 250px; }
        .leader-dots { flex-grow: 1; border-bottom: 1px dotted #cbd5e1; margin: 0 12px; height: 12px; opacity: 0.5; }
        .quick-copy { @apply opacity-0 group-hover:opacity-100 transition-opacity p-1 hover:bg-blue-100 rounded text-blue-500 cursor-pointer; }
    </style>
</head>
<body class="bg-stone-50 text-slate-800 min-h-screen flex flex-col text-sm">

    <!-- Header Section -->
    <header class="bg-white/90 sticky top-0 z-50 border-b border-stone-200 backdrop-blur-md border-t-4 border-t-blue-600 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 group cursor-pointer" onclick="app.switchTab(0)">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white text-2xl shadow-lg group-hover:scale-110 transition-transform">📂</div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tight uppercase leading-none">TC Master Ultimate</h1>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">Full Data & 40 Recipes Integrated</p>
                </div>
            </div>
            
            <div class="relative w-full md:w-1/3">
                <input type="text" id="globalSearch" placeholder="ID, 명령어, 레시피, 변수 등 통합 검색..." 
                    class="w-full bg-stone-100 border-none rounded-full py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 transition-all outline-none text-sm shadow-inner">
                <span class="absolute left-3 top-2.5 text-stone-400">🔍</span>
            </div>
        </div>

        <nav class="max-w-7xl mx-auto px-4 overflow-x-auto custom-scrollbar">
            <div class="flex space-x-8 border-b border-stone-200 whitespace-nowrap" id="navContainer">
            </div>
        </nav>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8" id="viewContainer">
    </main>

    <footer class="bg-white border-t border-stone-200 py-8 mt-10">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-stone-400 text-[10px] font-medium uppercase tracking-widest mb-1">Total Commander Ultimate Master Guide</p>
            <p class="text-stone-300 text-[9px] font-light italic">모든 데이터가 주신 원본 텍스트에 기반하여 전수 수록되었습니다.</p>
        </div>
    </footer>

    <script>
        const db = {
            categories: [
                { id: 0, title: "단축키 사전", icon: "⌨️" },
                { id: 1, title: "매개변수 & 옵션", icon: "🚀" },
                { id: 2, title: "시스템 변수 전체", icon: "🧩" },
                { id: 3, title: "버튼바 레시피 40선", icon: "🔘" },
                { id: 4, title: "내부 명령", icon: "📜" }
            ],
            shortcuts: [
                { key: "F1", desc: "도움말 호출", cmd: "cm_HelpIndex", cat: "기능키", tip: "상황에 맞는 도움말 표시" },
                { key: "F2", desc: "새로고침", cmd: "cm_RereadSource", cat: "기능키", tip: "소스 윈도우 목록 업데이트" },
                { key: "F3", desc: "파일 보기", cmd: "cm_List", cat: "기능키", tip: "Lister 실행 (내용 보기)" },
                { key: "F4", desc: "파일 편집", cmd: "cm_Edit", cat: "기능키", tip: "외부 에디터로 열기" },
                { key: "F5", desc: "복사", cmd: "cm_Copy", cat: "기능키", tip: "반대편 창으로 복사" },
                { key: "F6", desc: "이동/이름변경", cmd: "cm_RenMov", cat: "기능키", tip: "파일 이동 또는 제자리 이름 변경" },
                { key: "F7", desc: "새 폴더 생성", cmd: "cm_MkDir", cat: "기능키", tip: "현재 위치에 디렉토리 생성" },
                { key: "F8 / Del", desc: "삭제", cmd: "cm_Delete", cat: "기능키", tip: "휴지통으로 이동" },
                { key: "F9", desc: "메뉴 활성화", cmd: "cm_FocusMainMenu", cat: "기능키", tip: "상단 메뉴 포커스" },
                { key: "F10", desc: "왼쪽 메뉴 / 종료", cmd: "cm_Exit", cat: "기능키", tip: "프로그램 종료" },
                { key: "Alt + F1", desc: "왼쪽 드라이브", cmd: "cm_LeftOpenDrives", cat: "Alt", tip: "왼쪽 창 드라이브 목록" },
                { key: "Alt + F2", desc: "오른쪽 드라이브", cmd: "cm_RightOpenDrives", cat: "Alt", tip: "오른쪽 창 드라이브 목록" },
                { key: "Alt + Enter", desc: "속성", cmd: "cm_Properties", cat: "Alt", tip: "윈도우 속성창" },
                { key: "Ctrl + A", desc: "전체 선택", cmd: "cm_SelectAll", cat: "Ctrl", tip: "모두 선택" },
                { key: "Ctrl + B", desc: "분기 보기", cmd: "cm_DirBranch", cat: "Ctrl", tip: "하위 파일 평면화" },
                { key: "Ctrl + D", desc: "즐겨찾기", cmd: "cm_DirectoryHotlist", cat: "Ctrl", tip: "핫리스트 호출" },
                { key: "Ctrl + M", desc: "일괄 이름 변경", cmd: "cm_MultiRenameFiles", cat: "Ctrl", tip: "Multi-Rename Tool" },
                { key: "Ctrl + Q", desc: "퀵 뷰", cmd: "cm_SrcQuickView", cat: "Ctrl", tip: "미리보기 활성화" },
                { key: "Ctrl + T", desc: "새 탭 열기", cmd: "cm_OpenNewTab", cat: "Ctrl", tip: "현재 창 복제" },
                { key: "Ctrl + U", desc: "스왑", cmd: "cm_Exchange", cat: "Ctrl", tip: "경로 교체" },
                { key: "Ctrl + \\", desc: "루트 이동", cmd: "cm_GoToRoot", cat: "Ctrl", tip: "최상위 폴더 이동" },
                { key: "Backspace", desc: "상위 폴더", cmd: "cm_GoToParent", cat: "기타", tip: "부모 디렉토리 이동" },
                { key: "Num +", desc: "일괄 선택", cmd: "cm_SpreadSelection", cat: "기타", tip: "패턴으로 파일 선택" },
                { key: "Num -", desc: "일괄 해제", cmd: "cm_ShrinkSelection", cat: "기타", tip: "패턴으로 선택 해제" },
                { key: "Num *", desc: "선택 반전", cmd: "cm_ExchangeSelection", cat: "기타", tip: "선택 항목 뒤집기" },
                { key: "Space", desc: "선택/용량", cmd: "cm_GetFileSpace", cat: "기타", tip: "폴더 용량 계산" },
                { key: "Tab", desc: "패널 전환", cmd: "cm_FocusLeft/Right", cat: "기타", tip: "좌우 창 이동" }
            ],
            params: [
                { code: "%P", desc: "소스 경로 (\\ 포함)", cat: "경로", tip: "현재 활성 창의 전체 경로." },
                { code: "%p", desc: "소스 경로 (\\ 제외)", cat: "경로", tip: "끝에 역슬래시를 제외한 소스 경로." },
                { code: "%N", desc: "선택된 파일명", cat: "이름", tip: "커서 위치의 파일 이름(확장자 포함)." },
                { code: "%n", desc: "선택된 파일명 (확장자 제외)", cat: "이름", tip: "이름 본문만 추출." },
                { code: "%O", desc: "파일명 본문 (Name only)", cat: "이름", tip: "확장자 제외 순수 이름." },
                { code: "%E", desc: "확장자", cat: "이름", tip: "순수 확장자(점 미포함)." },
                { code: "%T", desc: "타겟 경로 (\\ 포함)", cat: "경로", tip: "반대편 창의 전체 경로." },
                { code: "%t", desc: "타겟 경로 (\\ 제외)", cat: "경로", tip: "반대편 창 경로 역슬래시 제외." },
                { code: "%M", desc: "타겟 창 선택 파일명", cat: "이름", tip: "반대편 창 커서 위치 파일명." },
                { code: "%m", desc: "타겟 창 파일명 (확장자 제외)", cat: "이름", tip: "반대편 창 이름 본문." },
                { code: "%S", desc: "선택된 모든 파일명", cat: "목록", tip: "선택된 모든 파일 목록 전달." },
                { code: "%D", desc: "선택된 모든 파일 경로", cat: "목록", tip: "전체 경로 목록 전달." },
                { code: "%V", desc: "현재 폴더명", cat: "이름", tip: "마지막 폴더 이름만 추출." },
                { code: "%L", desc: "경로 리스트 (ANSI)", cat: "리스트 생성", tip: "임시 .txt 리스트 파일 생성." },
                { code: "%l", desc: "짧은 경로 리스트 (8.3)", cat: "리스트 생성", tip: "8.3 포맷 경로 리스트 생성." },
                { code: "%F", desc: "파일명 리스트 (ANSI)", cat: "리스트 생성", tip: "파일명만 담은 리스트 생성." },
                { code: "%WL", desc: "경로 리스트 (UTF-16)", cat: "리스트 생성", tip: "유니코드 방식 리스트." },
                { code: "%WF", desc: "파일명 리스트 (UTF-16)", cat: "리스트 생성", tip: "유니코드 파일명 리스트." },
                { code: "%UL", desc: "경로 리스트 (UTF-8)", cat: "리스트 생성", tip: "UTF-8 인코딩 리스트 생성." },
                { code: "%UF", desc: "파일명 리스트 (UTF-8)", cat: "리스트 생성", tip: "UTF-8 파일명 리스트." },
                { code: "%X", desc: "매개변수 숨김 시작", cat: "특수 제어", tip: "명령줄에 표시 안 됨." },
                { code: "%Y", desc: "따옴표 자동 추가 안함", cat: "특수 제어", tip: "긴 경로 따옴표 무시." },
                { code: "%K", desc: "실행 후 창 유지", cat: "특수 제어", tip: "콘솔 종료 후 대기." },
                { code: "%A", desc: "압축 내 파일 지원", cat: "특수 제어", tip: "압축 내부 파일 파라미터 전달." },
                { code: "%Z", desc: "경로 변환 무시", cat: "특수 제어", tip: "로컬로 경로 강제 변환 안 함." },
                { code: "%R", desc: "소스/타겟 반전", cat: "특수 제어", tip: "활성/비활성 창 역할 임시 교체." },
                { code: "/O", desc: "기존 창 활성화", cat: "실행 옵션", tip: "이미 실행된 TC에 전달." },
                { code: "/N", desc: "무조건 새 창 실행", cat: "실행 옵션", tip: "항상 새로운 인스턴스 실행." },
                { code: "/T", desc: "새 탭으로 열기", cat: "실행 옵션", tip: "현재 탭 옆에 새 탭 생성." },
                { code: "/L=", desc: "왼쪽 경로 지정", cat: "실행 옵션", tip: "왼쪽 패널 초기 경로 설정." },
                { code: "/R=", desc: "오른쪽 경로 지정", cat: "실행 옵션", tip: "오른쪽 패널 초기 경로 설정." },
                { code: "/P=", desc: "활성 창 경로 지정", cat: "실행 옵션", tip: "포커스 패널 경로 지정." },
                { code: "/i=", desc: "설정 파일 지정", cat: "실행 옵션", tip: "ini 파일 별도 지정." },
                { code: "/F=", desc: "FTP 설정 지정", cat: "실행 옵션", tip: "FTP ini 별도 지정." },
                { code: "/S", desc: "단독 도구 실행", cat: "실행 옵션", tip: "메인 창 없이 단독 실행." },
                { code: "/S=C", desc: "파일 비교 도구", cat: "실행 옵션", tip: "내용 비교 즉시 실행." },
                { code: "/S=S", desc: "동기화 도구", cat: "실행 옵션", tip: "디렉토리 동기화 즉시 실행." },
                { code: "/S=L", desc: "Lister 실행", cat: "실행 옵션", tip: "Lister로 파일 바로 열기." },
                { code: "/A", desc: "압축 비교 활성", cat: "실행 옵션", tip: "압축 파일 내부 비교 지원." },
                { code: "/d=", desc: "실행 지연(초)", cat: "실행 옵션", tip: "지정 시간 대기 후 실행." }
            ],
            vars: [
                { name: "%COMMANDER_PATH%", desc: "TC 설치 폴더", cat: "TC 전용", tip: "토탈 커맨더 루트 디렉토리." },
                { name: "%COMMANDER_EXE%", desc: "TC 실행 파일 경로", cat: "TC 전용", tip: "totalcmd.exe 전체 경로." },
                { name: "%COMMANDER_INI%", desc: "로드된 설정 파일", cat: "TC 전용", tip: "wincmd.ini 절대 경로." },
                { name: "%COMMANDER_DRIVE%", desc: "TC 설치 드라이브", cat: "TC 전용", tip: "드라이브 문자(예: C:)." },
                { name: "%COMMANDER_CLP%", desc: "내부 클립보드 데이터", cat: "TC 전용", tip: "클립보드 내용 참조용." },
                { name: "%COMMANDER_LANGUAGE%", desc: "현재 설정 언어", cat: "TC 전용", tip: "사용 중인 언어 팩 정보." },
                { name: "%COMMANDER_EXE_X64%", desc: "64비트 실행 파일", cat: "TC 전용", tip: "64비트 전용 파일 경로." },
                { name: "%$DESKTOP%", desc: "바탕 화면", cat: "가상 경로", tip: "사용자 바탕 화면 경로." },
                { name: "%$PERSONAL%", desc: "내 문서", cat: "가상 경로", tip: "사용자 문서 폴더." },
                { name: "%$DOWNLOADS%", desc: "다운로드 폴더", cat: "가상 경로", tip: "시스템 기본 다운로드 위치." },
                { name: "%$PICTURES%", desc: "사진 폴더", cat: "가상 경로", tip: "라이브러리 사진 폴더." },
                { name: "%$MUSIC%", desc: "음악 폴더", cat: "가상 경로", tip: "라이브러리 음악 폴더." },
                { name: "%$VIDEOS%", desc: "동영상 폴더", cat: "가상 경로", tip: "라이브러리 비디오 폴더." },
                { name: "%$APPDATA%", desc: "AppData Roaming", cat: "가상 경로", tip: "Roaming 설정 폴더." },
                { name: "%$LOCALAPPDATA%", desc: "AppData Local", cat: "가상 경로", tip: "Local 설정 폴더." },
                { name: "%$PROGRAMS%", desc: "시작 메뉴 프로그램", cat: "가상 경로", tip: "시작 메뉴 앱 리스트." },
                { name: "%$STARTUP%", desc: "시작 프로그램", cat: "가상 경로", tip: "윈도우 자동 실행 항목." },
                { name: "%$FONTS%", desc: "시스템 글꼴", cat: "가상 경로", tip: "글꼴 설치 위치." },
                { name: "%$RECYCLEBIN%", desc: "휴지통", cat: "가상 경로", tip: "휴지통 가상 폴더." },
                { name: "%$DRIVES%", desc: "내 PC / 드라이브", cat: "가상 경로", tip: "모든 드라이브 목록." },
                { name: "%$NETWORK%", desc: "네트워크 환경", cat: "가상 경로", tip: "공유 리스트." },
                { name: "%$PRINTERS%", desc: "프린터 목록", cat: "가상 경로", tip: "설치된 프린터 폴더." },
                { name: "%$RECENT%", desc: "최근 사용 항목", cat: "가상 경로", tip: "최근 열었던 파일." },
                { name: "%$FAVORITES%", desc: "즐겨찾기", cat: "가상 경로", tip: "사용자 즐겨찾기 폴더." },
                { name: "%windir%", desc: "Windows 폴더", cat: "OS 환경", tip: "보통 C:\\Windows 경로." },
                { name: "%SystemRoot%", desc: "시스템 루트", cat: "OS 환경", tip: "OS 설치 경로." },
                { name: "%SystemDrive%", desc: "시스템 드라이브", cat: "OS 환경", tip: "OS 설치 드라이브." },
                { name: "%ProgramFiles%", desc: "Program Files", cat: "OS 환경", tip: "64비트 앱 설치 경로." },
                { name: "%UserProfile%", desc: "사용자 프로필", cat: "OS 환경", tip: "C:\\Users\\계정명." },

                this.state.currentTab = id;
                this.renderNav();
                const container = document.getElementById('viewContainer');
                container.innerHTML = "";
                
                switch(id) {
                    case 0: this.viewShortcuts(container); break;

                                <div class="p-4 bg-slate-900 text-emerald-400 font-mono rounded-xl mb-4 min-h-[70px] break-all text-xs leading-relaxed border-2 border-slate-800 shadow-2xl" id="paramResult">${this.state.testCommand}</div>
                                <button onclick="app.copyVal('paramResult')" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition-colors text-xs active:scale-95">결과 복사</button>
                                <button onclick="app.clearTest()" class="w-full mt-2 py-1 text-[10px] text-stone-400 hover:text-red-500 font-bold">비우기</button>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderParamList() {
                const list = this.state.paramFilter === "전체" ? db.params : db.params.filter(p => p.cat === this.state.paramFilter);
                return list.map(p => `
                    <div class="flex items-center gap-4 p-2.5 bg-white hover:bg-blue-50 rounded-xl transition-all group cursor-pointer border border-stone-100 shadow-sm" onclick="app.appendToTest('${p.code}')">
                        <code class="text-blue-600 font-black min-w-[55px] text-center text-[12px] bg-blue-50 rounded py-0.5">${p.code}</code>
                        <div class="flex-grow"><p class="text-xs font-bold text-slate-800">${p.desc}</p></div>
                    </div>
                `).join('');
            },

            viewVars(container) {
                const varCats = ["전체", "TC 전용", "가상 경로", "OS 환경"];
                container.innerHTML = `
                    <div class="space-y-6 animate-in fade-in duration-500 text-center">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-left">
                            <h2 class="text-xl font-black text-slate-800 tracking-tighter italic">🧩 시스템 및 TC 내장 변수</h2>
                            <div class="flex flex-wrap gap-1.5">
                                ${varCats.map(cat => `<button onclick="app.filterVars('${cat}')" class="param-chip ${this.state.varFilter === cat ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-stone-400 border-stone-200 hover:border-blue-400'}">${cat}</button>`).join('')}
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 text-left">
                            ${this.renderVarCards()}
                        </div>
                    </div>
                `;
            },

            renderVarCards() {
                const list = this.state.varFilter === "전체" ? db.vars : db.vars.filter(v => v.cat === this.state.varFilter);
                return list.map(v => `
                    <div class="bg-white p-4 rounded-xl border border-stone-200 group hover:border-blue-500 transition-all shadow-sm flex flex-col justify-between h-full">
                        <div>
                            <code class="text-blue-700 font-black text-[11px] block mb-1">${v.name}</code>
                            <h4 class="text-slate-800 font-bold mb-1 text-[12px]">${v.desc}</h4>
                            <p class="text-[10px] text-stone-400 mb-3 leading-tight">${v.tip}</p>
                        </div>
                        <button onclick="app.copyToClipboard('${v.name}')" class="w-full py-1.5 bg-stone-50 text-stone-400 text-[9px] font-black rounded-lg group-hover:bg-blue-600 group-hover:text-white transition-all uppercase tracking-widest">Copy</button>
                    </div>
                `).join('');
            },

            viewButtons(container) {
                container.innerHTML = `
                    <div class="max-w-7xl mx-auto space-y-6 animate-in fade-in duration-500 text-center">
                        <h2 class="text-xl font-black text-slate-800 tracking-tighter italic text-left">🔘 실전 버튼바 레시피 40선</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-left">
                            ${db.buttonPresets.map((p, idx) => `
                                <div class="glass-card p-5 rounded-2xl border border-stone-200 hover:border-blue-400 transition-all flex flex-col shadow-md recipe-card">
                                    <div class="flex justify-between items-start mb-3">
                                        <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[8px] font-black border border-blue-100 uppercase tracking-widest">${p.cat}</span>
                                        <span class="text-stone-200 font-black text-sm">#${(idx+1).toString().padStart(2, '0')}</span>
                                    </div>
                                    <h3 class="font-black text-slate-800 mb-1 text-[14px]">${p.title}</h3>
                                    <p class="text-[11px] text-stone-400 mb-4 flex-grow font-medium leading-relaxed">${p.tip}</p>
                                    <div class="space-y-2 bg-stone-100/80 p-3 rounded-xl border border-stone-200 shadow-inner">
                                        <div class="cursor-pointer group" onclick="app.copyToClipboard('${p.cmd}')">
                                            <p class="text-[8px] font-bold text-stone-400 uppercase">Cmd</p>
                                            <code class="text-[10px] font-bold text-blue-700 break-all bg-white px-2 py-0.5 rounded block group-hover:bg-blue-50 border border-stone-200">${p.cmd}</code>
                                        </div>
                                        ${p.param ? `<div class="cursor-pointer group" onclick="app.copyToClipboard('${p.param}')"><p class="text-[8px] font-bold text-stone-400 uppercase">Param</p><code class="text-[10px] font-bold text-emerald-700 break-all bg-white px-2 py-0.5 rounded block group-hover:bg-emerald-50 border border-stone-200">${p.param}</code></div>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            },

            viewInternalCommands(container) {
                container.innerHTML = `
                    <div class="space-y-4 animate-in fade-in duration-500">
                        <h2 class="text-xl font-black text-slate-800 tracking-tighter italic">📜 내부 명령</h2>
                        <div class="glass-card rounded-2xl overflow-hidden border border-stone-200 shadow-2xl">
                            <div class="overflow-x-auto custom-scrollbar" style="max-height: 75vh;">
                                <table class="w-full text-left border-collapse table-auto">
                                    <thead class="sticky-header shadow-sm border-b border-slate-300">
                                        <tr class="text-[9px] uppercase font-black text-slate-600">
                                            <th class="px-4 py-3 w-12 text-center">ID</th>
                                            <th class="px-4 py-3 w-64">내부 명령 (Command)</th>
                                            <th class="px-4 py-3">기능 설명 및 시각적 가이드</th>
                                            <th class="px-4 py-3 w-32 text-center text-slate-500 uppercase tracking-tighter">섹션</th>
                                        </tr>
                                    </thead>
                                    <tbody id="cmdTableBody" class="text-[11px]">
                                        ${this.renderCommandList(db.internalCommands)}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            },

            getInternalCatIcon(cat) {
                const icons = {
                    "Source": "📂", "Left": "⬅️", "Right": "➡️", "File Ops": "🛠️", "Config": "⚙️", 
                    "Net": "🌐", "Misc": "📎", "Mark": "✅", "Clip": "📋", "Nav": "📍", 
                    "Tabs": "📑", "Sort": "🔢", "User": "👤", "View": "👁️", "Window": "🗔", "Params": "⌨️", "CustomView": "🎨", "ViewMode": "🌈"
                };
                return icons[cat] || "•";
            },

            getInternalCatTextColor(cat) {
                const colors = {
                    "Source": "text-blue-600", "Left": "text-indigo-600", "Right": "text-purple-600",
                    "File Ops": "text-emerald-600", "Config": "text-orange-600", "Net": "text-cyan-600",
                    "Misc": "text-slate-600", "Mark": "text-rose-600", "Clip": "text-teal-600",
                    "Nav": "text-lime-600", "Tabs": "text-pink-600", "Sort": "text-amber-600",
                    "User": "text-fuchsia-600", "View": "text-sky-600", "Window": "text-gray-500",
                    "Params": "text-red-600", "CustomView": "text-amber-500", "ViewMode": "text-neutral-500"
                };
                return colors[cat] || "text-stone-400";
            },

            renderCommandList(list) {
                return list.map(c => {
                    const colorClass = this.getInternalCatTextColor(c.cat);
                    const icon = this.getInternalCatIcon(c.cat);
                    return `
                    <tr class="command-row border-b border-stone-100 transition-colors group">
                        <td class="px-4 py-2 font-mono text-stone-300 text-[10px] text-center">${c.id}</td>
                        <td class="px-4 py-2 font-bold ${colorClass} copyable-cmd rounded-md" onclick="app.copyToClipboard('${c.cmd}')">${c.cmd}</td>
                        <td class="px-4 py-2 text-stone-600 font-medium">
                            <div class="flex items-center w-full">
                                <span class="whitespace-nowrap">${c.desc}</span>
                                <div class="leader-dots"></div>
                                <div class="quick-copy" onclick="event.stopPropagation(); app.copyToClipboard('${c.cmd}')">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                                </div>
                            </div>
                        </td>
                        <td class="px-4 py-2 text-center">
                            <div class="flex items-center justify-center gap-1.5">
                                <span class="text-[10px]">${icon}</span>
                                <span class="${colorClass} text-[9px] font-black uppercase tracking-tighter">${c.cat}</span>
                            </div>
                        </td>
                    </tr>
                `}).join('');
            },

            renderSearchResults() {
                const container = document.getElementById('viewContainer');
                const query = this.state.query;
                const sRes = db.shortcuts.filter(s => s.key.toLowerCase().includes(query) || s.desc.toLowerCase().includes(query));
                const pRes = db.params.filter(p => p.code.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query));
                const vRes = db.vars.filter(v => v.name.toLowerCase().includes(query) || v.desc.toLowerCase().includes(query));
                const cRes = db.internalCommands.filter(c => c.cmd.toLowerCase().includes(query) || c.desc.toLowerCase().includes(query));
                const bRes = db.buttonPresets.filter(b => b.title.toLowerCase().includes(query) || b.tip.toLowerCase().includes(query));

                container.innerHTML = `
                    <div class="space-y-6 animate-in fade-in duration-300">
                        <h2 class="text-xl font-black text-slate-800 italic">"${query}" 통합 검색 결과 (${sRes.length + pRes.length + vRes.length + cRes.length + bRes.length})</h2>
                        ${cRes.length > 0 ? `<section><h3 class="font-black text-[10px] text-stone-400 mb-2 uppercase tracking-widest">내부 명령 (cm_)</h3><div class="glass-card p-3 rounded-2xl space-y-1 max-h-96 overflow-y-auto custom-scrollbar border shadow-inner bg-stone-100/50">${cRes.map(c => `<div class="flex items-center justify-between p-2 bg-white rounded-lg cursor-pointer hover:border-blue-400 border border-stone-100 transition-all shadow-sm" onclick="app.copyToClipboard('${c.cmd}')"><code class="text-blue-600 font-bold text-xs">${c.cmd}</code><span class="text-[11px] font-medium text-slate-500">${c.desc}</span></div>`).join('')}</div></section>` : ''}
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            ${sRes.length > 0 ? `<section><h3 class="font-black text-[10px] text-stone-400 mb-2 uppercase tracking-widest">단축키</h3><div class="grid grid-cols-1 gap-2">${sRes.map(s => `<div class="bg-white border p-3 rounded-xl font-bold text-xs shadow-sm flex justify-between"><span>${s.key}</span><span class="text-stone-400 text-[10px] font-normal italic">${s.desc}</span></div>`).join('')}</div></section>` : ''}
                            ${pRes.length > 0 ? `<section><h3 class="font-black text-[10px] text-stone-400 mb-2 uppercase tracking-widest">매개변수</h3><div class="glass-card p-3 rounded-2xl space-y-2 border shadow-inner">${pRes.map(p => `<div class="flex items-center gap-4 p-2 bg-white rounded-xl cursor-pointer hover:bg-blue-50 transition-all border shadow-sm" onclick="app.appendToTest('${p.code}')"><code class="text-blue-600 font-bold text-xs">${p.code}</code><span class="text-[11px] font-bold text-slate-700">${p.desc}</span></div>`).join('')}</div></section>` : ''}
                        </div>
                    </div>
                `;
            },

            copyToClipboard(text) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
                this.showToast(`복사됨: ${text}`);
            },

            showToast(msg) {
                const notice = document.createElement('div');
                notice.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-bold shadow-2xl z-[100] animate-in slide-in-from-bottom-5 border border-slate-700 shadow-blue-900/20";
                notice.innerHTML = `<span class="text-blue-400 mr-2 font-black">✓</span> ${msg}`;
                document.body.appendChild(notice);
                setTimeout(() => { if(notice) notice.remove(); }, 2000);
            },

            appendToTest(code) {
                this.state.testCommand += (this.state.testCommand ? " " : "") + code;
                const resultBox = document.getElementById('paramResult');
                if (resultBox) resultBox.innerText = this.state.testCommand;
                this.showToast(`추가됨: ${code}`);
            },

            filterParams(cat) { this.state.paramFilter = cat; this.viewParams(document.getElementById('viewContainer')); },
            filterVars(cat) { this.state.varFilter = cat; this.viewVars(document.getElementById('viewContainer')); },
            clearTest() { this.state.testCommand = ""; const box = document.getElementById('paramResult'); if(box) box.innerText = "..."; },
            copyVal(id) { const text = document.getElementById(id).innerText; if(text !== "...") this.copyToClipboard(text); }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
